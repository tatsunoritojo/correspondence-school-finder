      <h1>通信制高校診断 — 登録不要で自分に合う学校選びがわかる</h1>
      <p>資料請求なし・会員登録なしで今すぐ始められます。21問の質問に答えるだけで、通学頻度・費用・オンライン適性・自己管理力・進路志向・学校生活・メンタルヘルス・専門課程の8つの軸からあなたの優先順位を可視化します。</p>
      <h2>こんな方におすすめ</h2>
      <ul>
        <li>通信制高校への進学を検討している中学生・高校生</li>
        <li>不登校の状態から進路を考えたい方</li>
        <li>お子さまの学校選びをサポートしたい保護者の方</li>
        <li>全日制・通信制・定時制の違いを整理したい方</li>
      </ul>
      <h2>診断の特徴</h2>
      <ul>
        <li>登録不要・資料請求なし</li>
        <li>所要時間：約3〜4分（全21問）</li>
        <li>結果はレーダーチャートとPDFレポートで確認</li>
        <li>生徒本人と保護者、それぞれの視点で診断可能</li>
      </ul>
      <p>この診断を利用するにはJavaScriptを有効にしてください。</p>
      <p>進路についてより詳しく知りたい方は<a href="https://kodomo-shinro.jp/">こどもの進路案内所</a>もご覧ください。</p>
