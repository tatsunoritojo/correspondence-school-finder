[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SEO対象は / のみ。他の全ルートは noindex でインデックス除外
[[headers]]
  for = "/questions"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/result"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/r/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# /diagnose のシグナルを / に直接集約
[[redirects]]
  from = "/diagnose"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
